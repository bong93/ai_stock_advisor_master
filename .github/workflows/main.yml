name: V6 Quant Discord Bot

on:
  schedule:
    # KST 기준 08:45 실행 (UTC 23:45, 월~금)
    - cron: '45 23 * * 0-4'
    # KST 기준 16:00 실행 (UTC 07:00, 월~금)
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v3

      - name: Python 환경 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필요 라이브러리 설치
        run: |
          pip install -r requirements.txt

      - name: 아침 알람 실행 (KST 08:45)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        # UTC 시간이 23시면 아침 모드 실행
        if: "contains(github.event.schedule, '23')"
        run: python discord_bot.py --mode morning

      - name: 오후 채점 실행 (KST 16:00)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        # UTC 시간이 07시면 오후 모드 실행
        if: "contains(github.event.schedule, '7')"
        run: python discord_bot.py --mode afternoon
