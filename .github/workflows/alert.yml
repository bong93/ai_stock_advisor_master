name: AI Quant V6 Discord Bot

on:
  schedule:
    - cron: '45 23 * * 0-4' # KST 08:45 AM (월~금)
    - cron: '0 7 * * 1-5'   # KST 16:00 PM (월~금)
  
  # 🚀 수동 실행 버튼
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드 선택'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon
          - monthly

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 🌟 CSV 파일을 레포지토리에 다시 푸시하기 위해 꼭 필요한 쓰기 권한입니다!

    steps:
    - name: 📂 레포지토리 체크아웃 (LFS 포함)
      uses: actions/checkout@v4
      with:
        lfs: true 

    - name: 🐍 Python 3.10 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 필요 라이브러리 강력 설치 (버전 충돌 방지)
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install requests pandas numpy torch scikit-learn pytz ta finance-datareader beautifulsoup4 lxml lightgbm joblib

    - name: 🌅 [자동] 장 시작 전 브리핑 실행 (08:45)
      if: github.event.schedule == '45 23 * * 0-4'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python discord_alert.py --mode morning

    - name: 🏁 [자동] 장 마감 후 채점표 실행 (16:00)
      if: github.event.schedule == '0 7 * * 1-5'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python discord_alert.py --mode afternoon

    - name: 🚀 [수동] 테스트용 버튼 실행
      if: github.event_name == 'workflow_dispatch'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python discord_alert.py --mode ${{ inputs.mode }}
      
    - name: 💾 분석 결과 CSV 저장 및 깃허브 업로드
      # 🌟 실행 중 새로 생성되거나 변경된 모든 .csv 파일을 감지하여 깃허브에 영구 저장합니다.
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add *.csv
        git commit -m "📅 Data Update: $(date +'%Y-%m-%d %H:%M') AI 모델 분석 완료" || echo "No changes to commit"
        
        # 🌟 [문제 해결의 핵심!] 푸시하기 전에 깃허브의 최신 상태를 먼저 흡수(Pull)합니다.
        git pull --rebase origin main
        
        git push
