name: AI Quant V6 Discord Bot

on:
  schedule:
    - cron: '10 23 * * 0-4' # KST 08:10 AM (월~금)
    - cron: '0 7 * * 1-5'   # KST 16:00 PM (월~금)
  
  # 🚀 수동 실행 버튼
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드 선택'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - afternoon
          - monthly

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 🌟 CSV 파일을 레포지토리에 푸시하기 위한 필수 권한

    steps:
    - name: 📂 레포지토리 체크아웃 (LFS 포함)
      uses: actions/checkout@v4
      with:
        lfs: true 
        ref: main         # 🌟 명시적으로 main 브랜치 타겟팅
        fetch-depth: 0    # 🌟 얕은 복사 방지 (과거 기록을 모두 가져와 충돌을 원천 차단)

    - name: 🐍 Python 3.10 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 필요 라이브러리 강력 설치 (버전 충돌 방지)
      run: |
        python -m pip install --upgrade pip
        # requirements.txt가 있으면 설치하고, 없어도 아래에서 강제로 설치하여 에러를 방지합니다.
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install requests pandas numpy torch scikit-learn pytz ta finance-datareader beautifulsoup4 lxml lightgbm joblib holidays

    - name: 🌅 [자동] 장 시작 전 1,000종목 브리핑 실행 (08:10)
      if: github.event.schedule == '10 23 * * 0-4'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python discord_alert.py --mode morning

    - name: 🏁 [자동] 장 마감 후 채점표 실행 (16:00)
      if: github.event.schedule == '0 7 * * 1-5'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python discord_alert.py --mode afternoon

    - name: 🚀 [수동] 테스트용 버튼 실행
      if: github.event_name == 'workflow_dispatch'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python discord_alert.py --mode ${{ inputs.mode }}
      
    - name: 💾 분석 결과 CSV 저장 및 깃허브 업로드
      # 🌟 실행 중 새로 생성되거나 변경된 모든 .csv 파일을 감지하여 깃허브에 영구 저장
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add *.csv
        git commit -m "Data Update: $(date +'%Y-%m-%d %H:%M') AI 모델 1,000종목 분석 완료" || echo "No changes to commit"
        
        # 🌟 충돌 해결의 핵심: 푸시하기 전에 깃허브의 최신 상태를 강제로 가져와 합침
        git pull origin main --no-rebase -X ours
        
        git push origin main
