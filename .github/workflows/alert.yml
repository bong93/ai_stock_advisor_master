name: AI Quant V6 Discord Bot

on:
  schedule:
    # 🌟 [신규 스케줄] UTC 기준 시간 설정 (KST = UTC + 9)
    - cron: '05 21 * * 0-4'  # KST 06:05 AM (월~금) -> 새벽 전 종목 딥스캔 및 CSV 저장
    - cron: '33 23 * * 0-4'  # KST 08:33 AM (월~금) -> 장 시작 전 디스코드 알람 전송
    - cron: '11 7 * * 1-5'   # KST 16:11 PM (월~금) -> 장 마감 후 채점표 전송
  
  # 🚀 수동 실행 버튼
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드 선택'
        required: true
        default: 'morning_scan'
        type: choice
        options:
          - morning_scan
          - morning_alert
          - afternoon
          - monthly

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 🌟 CSV 파일을 레포지토리에 푸시하기 위한 필수 권한

    steps:
    - name: 📂 레포지토리 체크아웃 (LFS 포함)
      uses: actions/checkout@v4
      with:
        lfs: true 
        ref: main         # 🌟 명시적으로 main 브랜치 타겟팅
        fetch-depth: 0    # 🌟 얕은 복사 방지 (과거 기록을 모두 가져와 충돌을 원천 차단)

    - name: 🐍 Python 3.10 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 필요 라이브러리 강력 설치 (버전 충돌 방지)
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install requests pandas numpy torch scikit-learn pytz ta finance-datareader beautifulsoup4 lxml lightgbm joblib holidays

    - name: 🌅 [자동] 새벽 전 종목 스캔 및 CSV 굽기 (06:12)
      if: github.event.schedule == '12 21 * * 0-4'
      run: python discord_alert.py --mode morning_scan

    - name: 📢 [자동] 장 시작 전 주도주 브리핑 알람 (08:33)
      if: github.event.schedule == '33 23 * * 0-4'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python discord_alert.py --mode morning_alert

    - name: 🏁 [자동] 장 마감 후 채점표 실행 (16:11)
      if: github.event.schedule == '11 7 * * 1-5'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python discord_alert.py --mode afternoon

    - name: 🚀 [수동] 테스트용 버튼 실행
      if: github.event_name == 'workflow_dispatch'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python discord_alert.py --mode ${{ inputs.mode }}
      
    - name: 💾 분석 결과 CSV 저장 및 깃허브 업로드
      # 🌟 실행 중 새로 생성되거나 변경된 모든 .csv 파일을 감지하여 깃허브에 영구 저장
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add *.csv
        git commit -m "Data Update: $(date +'%Y-%m-%d %H:%M') AI 모델 전 종목 분석 완료" || echo "No changes to commit"
        
        # 🌟 충돌 시 고민하지 말고 무조건 봇이 방금 만든 최신 파일(-X ours)로 강제 덮어쓰기!
        git pull origin main --no-rebase -X ours
        
        git push origin main
